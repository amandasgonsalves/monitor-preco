<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Monitoramento de Preços</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container my-4">
        <h1 class="text-center mb-4">Sistema de Monitoramento de Preços</h1>
        
        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="busca-individual-tab" data-bs-toggle="tab" data-bs-target="#busca-individual" type="button" role="tab" aria-controls="busca-individual" aria-selected="true">Busca Individual</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="busca-massa-tab" data-bs-toggle="tab" data-bs-target="#busca-massa" type="button" role="tab" aria-controls="busca-massa" aria-selected="false">Busca em Massa</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="historico-tab" data-bs-toggle="tab" data-bs-target="#historico" type="button" role="tab" aria-controls="historico" aria-selected="false">Histórico</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="resultados-tab" data-bs-toggle="tab" data-bs-target="#resultados" type="button" role="tab" aria-controls="resultados" aria-selected="false">Resultados</button>
            </li>
        </ul>
        
        <div class="tab-content" id="myTabContent">
            <!-- Busca Individual -->
            <div class="tab-pane fade show active" id="busca-individual" role="tabpanel" aria-labelledby="busca-individual-tab">
                <div class="my-4 p-4 bg-light rounded">
                    <form action="/buscar" method="post">
                        <div class="mb-3">
                            <label for="produto" class="form-label">Nome do Produto</label>
                            <input type="text" class="form-control" id="produto" name="produto" placeholder="Ex: CLIMATIZADOR VENTISOL FRIO 16L CLIN16" required>
                        </div>
                        <input type="hidden" name="tipo_busca" value="individual">
                        <button type="submit" class="btn btn-primary">Buscar</button>
                    </form>
                </div>
            </div>
            
            <!-- Busca em Massa -->
            <div class="tab-pane fade" id="busca-massa" role="tabpanel" aria-labelledby="busca-massa-tab">
                <div class="my-4 p-4 bg-light rounded">
                    <form action="/buscar" method="post">
                        <div class="mb-3">
                            <label for="produtos" class="form-label">Lista de Produtos (um por linha)</label>
                            <textarea class="form-control" id="produtos" name="produtos" rows="5" placeholder="Ex: CLIMATIZADOR VENTISOL FRIO 16L CLIN16&#10;PAINEL CAEMMUN ESMERALDA 1,50" required></textarea>
                        </div>
                        <input type="hidden" name="tipo_busca" value="massa">
                        <button type="submit" class="btn btn-primary">Buscar</button>
                    </form>
                </div>
            </div>
            
            <!-- Histórico de Buscas -->
            <div class="tab-pane fade" id="historico" role="tabpanel" aria-labelledby="historico-tab">
                <div class="my-4">
                    <h4>Relatórios Anteriores</h4>
                    <div class="list-group">
                        {% for relatorio in relatorios %}
                            <a href="/relatorio/{{ relatorio }}" class="list-group-item list-group-item-action">
                                {{ relatorio }}
                            </a>
                        {% endfor %}
                    </div>
                </div>
            </div>

            <!-- Resultados das Buscas -->
            <div class="tab-pane fade" id="resultados" role="tabpanel" aria-labelledby="resultados-tab">
                <div class="my-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h3 class="mb-0">Resultados das Buscas</h3>
                        <button class="btn btn-outline-primary btn-sm" onclick="carregarResultados()">
                            🔄 Atualizar
                        </button>
                    </div>
                    <div id="resultados-container">
                        <div class="text-center text-muted py-5">
                            <div class="mb-3" style="font-size:3rem;">📦</div>
                            <p>Clique na aba <strong>Resultados</strong> para carregar os dados.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Carregamento -->
    <div class="modal fade" id="loadingModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Carregando...</span>
                    </div>
                    <p class="mt-3">Realizando busca de produtos. Por favor, aguarde...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script>
      // Parseia preço "R$ 1.319,90" para float
      function parsePreco(s) {
        if (!s || typeof s !== 'string') return Infinity;
        const v = parseFloat(s.replace('R$','').replace(/\./g,'').replace(',','.').trim());
        return isNaN(v) ? Infinity : v;
      }

      function carregarResultados() {
        const container = document.getElementById('resultados-container');
        container.innerHTML = `
          <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-muted">Carregando resultados...</p>
          </div>`;

        fetch('/api/resultados')
          .then(r => r.json())
          .then(grupos => renderizarGrupos(grupos))
          .catch(err => {
            container.innerHTML = `<div class="alert alert-danger text-center mt-3">Erro ao carregar: ${err.message}</div>`;
          });
      }

      function renderizarGrupos(grupos) {
        const container = document.getElementById('resultados-container');
        container.innerHTML = '';

        if (!grupos.length) {
          container.innerHTML = `
            <div class="text-center text-muted py-5">
              <div style="font-size:3.5rem;">🔍</div>
              <h5 class="mt-3">Nenhum resultado ainda</h5>
              <p>Realize uma busca para ver os resultados aqui.</p>
            </div>`;
          return;
        }

        grupos.forEach((grupo, gIdx) => {
          const totalProdutos = grupo.buscas.reduce((s, b) => s + (b.produtos_patrocinados || []).length, 0);
          const totalBuscas = grupo.buscas.length;

          const div = document.createElement('div');
          div.className = 'grupo-busca mb-3';
          div.innerHTML = `
            <div class="grupo-header" onclick="toggleGrupo(${gIdx})">
              <div class="grupo-header-info">
                <span class="grupo-icone">📅</span>
                <div>
                  <div class="grupo-data">Busca em ${grupo.data_display}</div>
                  <div class="grupo-resumo">
                    ${totalBuscas} produto${totalBuscas > 1 ? 's' : ''} buscado${totalBuscas > 1 ? 's' : ''}
                    &nbsp;·&nbsp;
                    ${totalProdutos} resultado${totalProdutos !== 1 ? 's' : ''} encontrado${totalProdutos !== 1 ? 's' : ''}
                  </div>
                </div>
              </div>
              <span class="grupo-seta" id="grupo-seta-${gIdx}">${gIdx === 0 ? '▲' : '▼'}</span>
            </div>
            <div class="grupo-body ${gIdx === 0 ? 'aberto' : ''}" id="grupo-body-${gIdx}">
              ${renderizarBuscasDoGrupo(grupo.buscas, gIdx)}
            </div>
          `;
          container.appendChild(div);
        });
      }

      function renderizarBuscasDoGrupo(buscas, gIdx) {
        let html = '';
        buscas.forEach((busca, bIdx) => {
          const produtos = busca.produtos_patrocinados || [];
          const tem = produtos.length > 0;

          // Menor preço dessa busca
          let menor = Infinity;
          produtos.forEach(p => { const v = parsePreco(p.preco); if (v < menor) menor = v; });

          html += `
            <div class="busca-item">
              <div class="busca-item-header">
                <div class="busca-item-nome">
                  <span class="busca-status ${tem ? 'status-ok' : 'status-vazio'}">${tem ? '✅' : '⚠️'}</span>
                  <strong>${busca.produto_buscado || 'Sem nome'}</strong>
                </div>
                <div class="busca-item-badges">
                  ${tem
                    ? `<span class="badge-qtd">${produtos.length} resultado${produtos.length > 1 ? 's' : ''}</span>`
                    : '<span class="badge-vazio-sm">Sem resultados</span>'
                  }
                  <button class="btn-deletar" onclick="deletarResultado('${busca.arquivo}')" title="Remover">🗑️</button>
                </div>
              </div>
              ${tem ? renderizarTabelaProdutos(produtos, menor) : ''}
            </div>
          `;
        });
        return html;
      }

      function renderizarTabelaProdutos(produtos, menorPreco) {
        // Ordena por preço (menor primeiro)
        const ordenados = [...produtos].sort((a, b) => parsePreco(a.preco) - parsePreco(b.preco));

        let html = `
          <div class="tabela-produtos">
            <table>
              <thead>
                <tr>
                  <th class="col-num">#</th>
                  <th class="col-nome">Produto</th>
                  <th class="col-preco">Preço</th>
                  <th class="col-loja">Loja</th>
                  <th class="col-acao">Ação</th>
                </tr>
              </thead>
              <tbody>`;

        ordenados.forEach((p, i) => {
          const preco = parsePreco(p.preco);
          const isMelhor = preco === menorPreco && preco !== Infinity;

          html += `
                <tr class="${isMelhor ? 'linha-melhor' : ''}">
                  <td class="col-num">${i + 1}</td>
                  <td class="col-nome" title="${p.nome || ''}">${p.nome || 'N/A'}</td>
                  <td class="col-preco ${isMelhor ? 'preco-melhor' : ''}">${p.preco || 'N/A'}${isMelhor ? ' ⭐' : ''}</td>
                  <td class="col-loja"><span class="loja-tag ${getLojaClass(p.loja)}">${p.loja || 'N/A'}</span></td>
                  <td class="col-acao">
                    ${p.link ? `<a href="${p.link}" target="_blank" class="btn-ver">Ver →</a>` : '—'}
                  </td>
                </tr>`;
        });

        html += `
              </tbody>
            </table>
          </div>`;
        return html;
      }

      function getLojaClass(loja) {
        if (!loja) return '';
        const l = loja.toLowerCase();
        if (l.includes('amazon')) return 'loja-amazon';
        if (l.includes('mercado') || l.includes('ml')) return 'loja-ml';
        if (l.includes('magazine') || l.includes('magalu')) return 'loja-magalu';
        if (l.includes('casas') || l.includes('bahia')) return 'loja-casasbahia';
        if (l.includes('kabum')) return 'loja-kabum';
        return '';
      }

      function toggleGrupo(idx) {
        const body = document.getElementById('grupo-body-' + idx);
        const seta = document.getElementById('grupo-seta-' + idx);
        body.classList.toggle('aberto');
        seta.textContent = body.classList.contains('aberto') ? '▲' : '▼';
      }

      function deletarResultado(arquivo) {
        if (!confirm('Remover este resultado?')) return;
        fetch('/api/resultados/' + arquivo, { method: 'DELETE' })
          .then(r => r.json())
          .then(d => { if (d.success) carregarResultados(); else alert(d.message); })
          .catch(e => alert('Erro: ' + e.message));
      }

      // Carrega ao abrir a aba
      document.getElementById('resultados-tab').addEventListener('shown.bs.tab', carregarResultados);
    </script>
</body>
</html>
